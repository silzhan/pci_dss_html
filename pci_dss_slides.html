<head>
<meta charset="UTF-8">

<title>PCI DSS v4.0</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;font-family:'Segoe UI','Microsoft YaHei',sans-serif;background:#0c1222;color:#e2e8f0}
#app{display:flex;flex-direction:column;height:100%}
.bar{display:flex;align-items:center;justify-content:space-between;padding:6px 20px;background:#0f172a;border-bottom:1px solid rgba(255,255,255,.06);flex-shrink:0}
.bl{display:flex;align-items:center;gap:10px}
.bl .dot{width:24px;height:24px;background:linear-gradient(135deg,#3b82f6,#8b5cf6);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:#fff}
.bl h1{font-size:14px;font-weight:600;color:#e2e8f0}
.br{display:flex;gap:4px;align-items:center}
.br button{background:transparent;border:1px solid rgba(255,255,255,.08);color:#94a3b8;padding:4px 10px;border-radius:5px;font-size:11px;cursor:pointer;font-family:inherit}
.br button:hover{background:rgba(255,255,255,.06);color:#e2e8f0}
.br button:disabled{opacity:.2;cursor:default}
.br button.on{background:rgba(99,102,241,.15);border-color:rgba(99,102,241,.3);color:#a5b4fc}
.cnt{font-size:11px;color:#475569;min-width:44px;text-align:center}
.prog{height:2px;background:rgba(255,255,255,.03);flex-shrink:0}
.pbar{height:100%;background:linear-gradient(90deg,#3b82f6,#8b5cf6);transition:width .35s}
.main{flex:1;display:flex;overflow:hidden}
.sa{flex:1;display:flex;align-items:center;justify-content:center;padding:12px 56px;position:relative;background:radial-gradient(ellipse at 50% 40%,#131c2e,#0c1222 70%)}
.sw{width:100%;height:100%;display:flex;align-items:center;justify-content:center}
.slide{width:100%;display:flex;flex-direction:column;align-items:center}
.slide svg{max-width:100%;max-height:calc(100vh - 80px);display:block;border-radius:8px;box-shadow:0 2px 20px rgba(0,0,0,.5)}
.stag{font-size:11px;color:#475569;margin-bottom:6px;display:flex;align-items:center;gap:6px}
.stag .snum{background:linear-gradient(135deg,#3b82f6,#6366f1);color:#fff;font-size:10px;font-weight:700;padding:1px 6px;border-radius:8px}
.arr{position:absolute;top:50%;transform:translateY(-50%);background:rgba(12,18,34,.7);border:1px solid rgba(255,255,255,.06);color:#64748b;width:38px;height:38px;border-radius:50%;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:10}
.arr:hover{background:rgba(59,130,246,.6);color:#fff}
.arr:disabled{opacity:.08;cursor:default;pointer-events:none}
.al{left:10px}.ar{right:10px}
.np{width:0;overflow:hidden;background:#0a0f1a;border-left:1px solid rgba(255,255,255,.04);transition:width .25s;flex-shrink:0}
.np.open{width:340px}
.ni{width:340px;height:100%;overflow-y:auto;padding:14px 18px}
.ni h3{font-size:11px;color:#475569;margin-bottom:10px;font-weight:500;text-transform:uppercase;letter-spacing:1.5px}
.ni .nt{font-size:16px;font-weight:700;color:#e2e8f0;margin-bottom:3px}
.ni .nm{font-size:10px;color:#334155;margin-bottom:12px;padding-bottom:12px;border-bottom:1px solid rgba(255,255,255,.04)}
.ni .nd{font-size:12px;color:#94a3b8;line-height:1.85}
.ni .nd b{color:#60a5fa;font-weight:600}
.mo{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(12,18,34,.97);z-index:50;opacity:0;pointer-events:none;transition:opacity .35s}
.mo.show{opacity:1;pointer-events:auto}
.mo .mt{font-size:12px;color:#475569;text-transform:uppercase;letter-spacing:4px;margin-bottom:10px}
.mo .mh{font-size:44px;font-weight:800;background:linear-gradient(135deg,#60a5fa,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.mo .ms{font-size:18px;color:#64748b;margin-top:6px}
.kh{position:fixed;bottom:8px;right:14px;font-size:9px;color:#1e293b}
.kh kbd{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);padding:0 3px;border-radius:2px;font-family:inherit}
</style>
</head>
<body>
<div id="app">
<div class="bar"><div class="bl"><div class="dot">P</div><h1>PCI DSS v4.0</h1></div>

<button id="bp" onclick="go(-1)">◀</button>

  <!-- Module 2 -->
  <rect x="255" y="110" width="190" height="220" rx="16" fill="url(#g2)" filter="url(#shadow)"/>
  <text x="350" y="160" text-anchor="middle" font-size="42" fill="white">🛒</text>
  <text x="350" y="200" text-anchor="middle" font-size="18" font-weight="700" fill="white">模块二</text>
  <text x="350" y="228" text-anchor="middle" font-size="15" font-weight="600" fill="rgba(255,255,255,0.95)">产品落地</text>
  <line x1="295" y1="245" x2="405" y2="245" stroke="rgba(255,255,255,0.4)" stroke-width="1"/>
  <text x="350" y="270" text-anchor="middle" font-size="12" fill="rgba(255,255,255,0.85)">接入 · CIT/MIT · Token</text>
  <text x="350" y="295" text-anchor="middle" font-size="11" fill="rgba(255,255,255,0.7)">选型压最小 PCI 成本？</text>

  <!-- Arrow 2→3 -->
  <path d="M455,220 L475,220" stroke="#94a3b8" stroke-width="2" fill="none"/>

  <!-- Module 3 -->
  <rect x="480" y="110" width="190" height="220" rx="16" fill="url(#g3)" filter="url(#shadow)"/>
  <text x="575" y="160" text-anchor="middle" font-size="42" fill="white">🏗️</text>

  <line x1="520" y1="245" x2="630" y2="245" stroke="rgba(255,255,255,0.4)" stroke-width="1"/>

  <text x="575" y="295" text-anchor="middle" font-size="11" fill="rgba(255,255,255,0.7)">怎么落地？</text>

  <!-- Arrow 3→4 -->
  <path d="M680,220 L700,220" stroke="#94a3b8" stroke-width="2" fill="none"/>

  <!-- Module 4 -->
  <rect x="705" y="110" width="165" height="220" rx="16" fill="url(#g4)" filter="url(#shadow)"/>
  <text x="787" y="160" text-anchor="middle" font-size="42" fill="white">🔍</text>
  <text x="787" y="200" text-anchor="middle" font-size="18" font-weight="700" fill="white">模块四</text>
  <text x="787" y="228" text-anchor="middle" font-size="15" font-weight="600" fill="rgba(255,255,255,0.95)">运营审计</text>
  <line x1="735" y1="245" x2="840" y2="245" stroke="rgba(255,255,255,0.4)" stroke-width="1"/>
  <text x="787" y="270" text-anchor="middle" font-size="12" fill="rgba(255,255,255,0.85)">客服 · 测试 · 权限 · 响应</text>

<div class="slide" id="s1" style="display:none">
<div class="stag"><span class="snum">02</span> 定位与边界</div>
<svg xmlns="http://www.w3.org/2000/svg" width="900" viewBox="0 0 900 420" font-family="'Segoe UI','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="shadow" x="-3%" y="-3%" width="106%" height="112%">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-opacity="0.12"/>
    </filter>
  </defs>
  <rect width="900" height="420" rx="12" fill="#f8fafc"/>
  <text x="450" y="42" text-anchor="middle" font-size="24" font-weight="700" fill="#1e293b">PCI DSS · 定位与边界</text>
  <line x1="330" y1="56" x2="570" y2="56" stroke="#1a73e8" stroke-width="3" stroke-linecap="round"/>

  <!-- Left: What PCI IS -->
  <rect x="40" y="85" width="400" height="310" rx="14" fill="white" stroke="#e2e8f0" stroke-width="1" filter="url(#shadow)"/>
  <rect x="40" y="85" width="400" height="44" rx="14" fill="#1a73e8"/>
  <rect x="40" y="110" width="400" height="19" fill="#1a73e8"/>
  <text x="240" y="113" text-anchor="middle" font-size="16" font-weight="700" fill="white">PCI DSS 是什么</text>

  <text x="70" y="155" font-size="14" fill="#334155">
    <tspan font-weight="700" fill="#1a73e8">▎</tspan> 支付责任边界，不是通用安全清单
  </text>
  <text x="70" y="180" font-size="13" fill="#64748b">  核心：卡数据流 + CDE 安全影响</text>

  <text x="70" y="210" font-size="14" fill="#334155">
    <tspan font-weight="700" fill="#1a73e8">▎</tspan> 谁处理卡、数据流经哪里、谁影响 CDE
  </text>
  <text x="70" y="235" font-size="13" fill="#64748b">  200 个微服务，可能只有少数直接处理卡数据</text>

  <text x="70" y="265" font-size="14" fill="#334155">
    <tspan font-weight="700" fill="#1a73e8">▎</tspan> 本质是架构决策，不是安全团队的活
  </text>
  <text x="70" y="290" font-size="13" fill="#64748b">  Hosted Page vs Direct API → 未来三年合规成本</text>

  <text x="70" y="320" font-size="14" fill="#334155">
    <tspan font-weight="700" fill="#ef4444">▎</tspan> v4.0：从"年度大考"变成"持续运营"
  </text>
  <text x="70" y="345" font-size="13" fill="#64748b">  日志、告警、变更管理都得自动化</text>
  <text x="70" y="370" font-size="13" fill="#64748b">  年度 snapshot 时代结束了</text>

  <!-- Right: What PCI is NOT -->
  <rect x="460" y="85" width="400" height="310" rx="14" fill="white" stroke="#e2e8f0" stroke-width="1" filter="url(#shadow)"/>
  <rect x="460" y="85" width="400" height="44" rx="14" fill="#ef4444"/>
  <rect x="460" y="110" width="400" height="19" fill="#ef4444"/>
  <text x="660" y="113" text-anchor="middle" font-size="16" font-weight="700" fill="white">常见误解 ❌</text>

  <text x="490" y="155" font-size="14" fill="#334155">
    <tspan fill="#ef4444" font-weight="700">✗</tspan> "我们没有直接收卡号就没事"
  </text>
  <text x="490" y="180" font-size="13" fill="#64748b">  → ELK 一条日志打 PAN，整个集群进 CDE</text>

  <text x="490" y="210" font-size="14" fill="#334155">
    <tspan fill="#ef4444" font-weight="700">✗</tspan> "PCI 是安全团队的事"
  </text>
  <text x="490" y="235" font-size="13" fill="#64748b">  → 产品选型那一刻，合规成本就定了</text>

  <text x="490" y="265" font-size="14" fill="#334155">
    <tspan fill="#ef4444" font-weight="700">✗</tspan> "年底突击三个月能过"
  </text>
  <text x="490" y="290" font-size="13" fill="#64748b">  → v4.0 要求持续监控、持续评估</text>

  <text x="490" y="320" font-size="14" fill="#334155">
    <tspan fill="#ef4444" font-weight="700">✗</tspan> "PCI = ISO27001 那种通用安全清单"
  </text>
  <text x="490" y="345" font-size="13" fill="#64748b">  → 关注卡数据生命周期和 CDE 安全影响</text>
  <text x="490" y="370" font-size="13" fill="#64748b">  → 剩余系统要证明不影响 CDE</text>
</svg>

<div class="stag"><span class="snum">03</span> 认证等级与验证方式</div>
<svg xmlns="http://www.w3.org/2000/svg" width="900" viewBox="0 0 900 480" font-family="'Segoe UI','Microsoft YaHei',sans-serif">

<script>
var NOTES=[{t:"01 · 目录 · 四大模块",m:"1 分钟",d:"今天把 PCI DSS 翻译成产品、架构、运营能听懂的语言。四模块走完回答三件事：公司在 Scope 里吗？选型压最小 PCI 成本了吗？出事怎么兜底？"},{t:"02 · 定位与边界",m:"3 分钟",d:"PCI 的核心判断是：**哪些系统存储、处理、传输卡数据，或能影响 CDE 安全**。本质是架构决策，不是安全团队的活。v4.0 要求持续监控，年度 snapshot 时代结束。"},{t:"03 · 认证等级与验证方式",m:"4 分钟",d:"SAQ 类型由**产品形态决定**。Hosted Page 走 SAQ A，iframe 走 SAQ A-EP（甜点区），Direct API 走 SAQ D（300+ 问题）。从 D 降到 A-EP，合规工作量少 80%。"},{t:"04 · PCI Scope",m:"4 分钟",d:"同心圆：CDE 核心 → Scope 边界 → 风险盲区。ELK 一条日志打 PAN 整个集群进 CDE。降 Scope 七件套：能不碰就不碰。铁律：**授权后 CVV 永远不存**。"},{t:"05 · 支付产品形态与 PCI 影响",m:"4 分钟",d:"Hosted Page(SAQ A 最小) → Elements(SAQ A-EP 甜点区) → Direct API(SAQ D 最大)。Click to Pay: 商户侧卡数据暴露面极低，未来方向。"},{t:"06 · CIT / MIT 与业务场景",m:"3 分钟",d:"首次 CIT 完成强认证或合规豁免，后续 MIT 带凭证。Network Token 解 involuntary churn。"},{t:"07 · Tokenization",m:"4 分钟",d:"四种 Token：PSP Token(锁定单 PSP)、Merchant Token(自建跨 PSP)、**Network Token**(授权率常见 +2~5%，生命周期管理)、Payment Method ID(钱包)。"},{t:"08 · Card Vault 选型",m:"4 分钟",d:"PSP Vault(最低) → 第三方(中等跨 PSP) → 自建(最高强控制)。独立 Vault 核心价值是**编排**：成本路由、授权率路由、容灾切换。"},{t:"09 · 密钥管理",m:"4 分钟",d:"常见翻车：密钥硬编码、密钥密文同库、生产密钥拷测试、邮件发密钥。信封加密：Master Key → KEK → DEK → PAN。拖库也解不开。"},{t:"10 · 前端支付页安全",m:"4 分钟",d:"Magecart 在浏览器里偷。英航案例：22 行代码、约 38 万交易受影响、最终罚 2000 万英镑。防御：CSP + SRI + 脚本白名单 + 篡改检测。"},{t:"11 · 数据治理",m:"4 分钟",d:"核心问题：卡数据其他副本在哪？ELK、APM、客服、BI、测试环境。每份副本都要追踪和脱敏。"},{t:"12 · 研发与测试",m:"3 分钟",d:"两条红线重大不符合风险：测试环境用真实卡号、密钥进 Git 仓库。用 Secrets Manager + git-secrets。"},{t:"13 · 事件响应",m:"4 分钟",d:"PAN 泄露按外部规则通知，内部按 24h 目标演练。CVV 被记录比 PAN 泄露更严重。时间线：T+0 启动 → T+4 取证 → T+24 完成必要通知 → T+72 报告 → T+30 复盘。"},{t:"14 · 培训主线 · 收尾",m:"2 分钟",d:"PCI 转业务收益：Network Token 提授权率 2~5%、Token 编排撑多 PSP 容灾。四步逻辑链：合规 → 产品 → 技术 → 运营。谢谢。"}];
var MMAP={"模块一":["MODULE 1","合规判断"],"模块二":["MODULE 2","产品落地"],"模块三":["MODULE 3","技术架构"],"模块四":["MODULE 4","运营审计"]};

var cur=0,no=false,ot=null;
var ss=document.querySelectorAll(".slide"),tot=ss.length;
function render(){
  for(var i=0;i<tot;i++) ss[i].style.display=(i===cur)?"flex":"none";
  var n=NOTES[cur];
  document.getElementById("nt").textContent=n.t;
  document.getElementById("nm").textContent="预计时长："+n.m;
  document.getElementById("nd").innerHTML=n.d.replace(/\*\*(.*?)\*\*/g,"<b>$1</b>").replace(/\n/g,"<br>");
  document.getElementById("cnt").textContent=(cur+1)+" / "+tot;
  document.getElementById("pb").style.width=((cur+1)/tot*100)+"%";
  document.getElementById("bp").disabled=(cur===0);
  document.getElementById("bn").disabled=(cur===tot-1);
  document.getElementById("al").disabled=(cur===0);
  document.getElementById("ar").disabled=(cur===tot-1);
  var m=ss[cur].getAttribute("data-mod");
  if(m&&MMAP[m]) showMod(MMAP[m][0],MMAP[m][1]);
}
function showMod(t,s){
  document.getElementById("mot").textContent=t;
  document.getElementById("moh").textContent=s;
  document.getElementById("mos").textContent="";
  var o=document.getElementById("mo");
  o.classList.add("show");
  clearTimeout(ot);
  ot=setTimeout(function(){o.classList.remove("show")},1600);
}
function go(d){var n=cur+d;if(n>=0&&n<tot){cur=n;render();}}
function tn(){no=!no;document.getElementById("np").classList.toggle("open",no);document.getElementById("bno").classList.toggle("on",no);}
function fs(){if(!document.fullscreenElement)document.documentElement.requestFullscreen().catch(function(){});else document.exitFullscreen();}
document.addEventListener("keydown",function(e){
  if(e.key==="ArrowLeft"||e.key==="ArrowUp"){e.preventDefault();go(-1);}
  else if(e.key==="ArrowRight"||e.key==="ArrowDown"||e.key===" "){e.preventDefault();go(1);}
  else if(e.key==="n"||e.key==="N"){tn();}
  else if(e.key==="f"||e.key==="F"){fs();}
  else if(e.key==="Escape"){document.getElementById("mo").classList.remove("show");}
});
var tx=0;
document.addEventListener("touchstart",function(e){tx=e.touches[0].clientX;});
document.addEventListener("touchend",function(e){var dx=e.changedTouches[0].clientX-tx;if(Math.abs(dx)>50)go(dx<0?1:-1);});
document.getElementById("mo").addEventListener("click",function(){this.classList.remove("show");});
render();
</script>
